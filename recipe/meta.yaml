{% set name = "splits" %}
{% set version = "0.1.9" %}
{% set compress_type = "tar.gz" %}
{% set hash_val = "0d599bdf25482d0a9cb8a5b095542fe3cdf2c4bc8bd13e8ef3cb2b83f7e36678" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.{{ compress_type }}
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ compress_type }}
  sha256: {{ hash_val }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip

  run:
    - python >={{ python_min }}
    - boto
    - nose
    - six

test:
  requires:
    - python {{ python_min }}
  imports:
    - splits
    - splits.readers
    - splits.s3
    - splits.util
    - splits.writers

about:
  home: https://github.com/stitchfix/splits
  license: MIT
  # license_file: No MANIFEST.in - see https://github.com/stitchfix/splits/pull/16
  license_family: MIT
  summary: 'A library for dealing with splittable files'

extra:
  recipe-maintainers:
    - pmlandwehr
